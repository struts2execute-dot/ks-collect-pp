
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;
    types {
      application/javascript js mjs;
      application/json       json map;
      application/wasm       wasm;
      text/css               css;
      # Cocos 常见纯文本
      text/plain             txt fnt plist atlas manifest;
      image/avif             avif;
      image/webp             webp;
    }

    # 后端统一出口：只改这里就能换后端地址
    upstream pp_backend {
        server 127.0.0.1:8888;
    }

    server {
        listen 443 ssl;
        server_name pp.totima.net;

        ssl_certificate     /Users/it_nq_hd021/workspace-ks/ks-collect-pp/certificate/aa.crt;
        ssl_certificate_key /Users/it_nq_hd021/workspace-ks/ks-collect-pp/certificate/aa.key;

        root /Users/it_nq_hd021/workspace-ks/ks-collect-pp/resources/common-static-cf.pragmaticplay.net;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
        add_header Access-Control-Max-Age "86400" always;

        # 预检：只返回
        if ($request_method = OPTIONS) { return 204; }

        # announcements 走后端
        location ^~ /gs2c/announcements/ {
            proxy_http_version 1.1;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://pp_backend$request_uri;
        }

        # /gs2c/api （history）
        location ^~ /gs2c/api/ {
            proxy_http_version 1.1;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://pp_backend$request_uri;
        }

        location ^~ /gs2c/promo/ {
            proxy_http_version 1.1;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://pp_backend$request_uri;
        }

        # /gs2c/minilobby （lobby）
        location ^~ /gs2c/minilobby/ {
            proxy_http_version 1.1;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://pp_backend$request_uri;
        }

        # v5 目录下接口走后端（只限定 v3，不影响其他 /gs2c 静态）
        location ~ ^/gs2c/ge/v(3|4)/ {
            proxy_http_version 1.1;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://pp_backend$request_uri;
        }

        # ReplayService 走后端
        location ~ ^/(ReplayService|ReplayServiceGlobal)/ {
            proxy_http_version 1.1;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://pp_backend$request_uri;
        }

        # .do 统配走后端
        location ~* \.do$ {
            proxy_http_version 1.1;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://pp_backend$request_uri;
        }

       location ^~ /ClientAPI {
            proxy_http_version 1.1;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://pp_backend$request_uri;
        }

        # 第三方对接 API
        location ^~ /api/v1/ {
            proxy_http_version 1.1;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://pp_backend$request_uri;
        }

        # 其他走本地静态
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
